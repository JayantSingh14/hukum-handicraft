# ── Production Profile (PostgreSQL on Render) ─────────────────────────────────
# Active when SPRING_PROFILES_ACTIVE=prod
# All secrets MUST be set as environment variables in the Render dashboard.

# Server — Render injects PORT automatically
server.port=${PORT:8080}

# ── Database (Render PostgreSQL) ───────────────────────────────────────────────
# Set these in Render → Environment:
#   SPRING_DATASOURCE_URL      = jdbc:postgresql://<host>/<dbname>
#   SPRING_DATASOURCE_USERNAME = your-pg-username
#   SPRING_DATASOURCE_PASSWORD = your-pg-password
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Let Hibernate auto-detect the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── Neon PostgreSQL SSL ────────────────────────────────────────────────────────
spring.datasource.hikari.data-source-properties.ssl=true
spring.datasource.hikari.data-source-properties.sslmode=require

# ── Actuator — Health endpoint for Render health checks ───────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ── Payment ───────────────────────────────────────────────────────────────────
razorpay.api.key=${RAZORPAY_KEY}
razorpay.api.secret=${RAZORPAY_SECRET}
stripe.api.key=${STRIPE_API_KEY}

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── AI ─────────────────────────────────────────────────────────────────────────
groq.api.key=${GROQ_API_KEY}

# ── Google OAuth ───────────────────────────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.mail=WARN
logging.level.com.sun.mail=WARN
