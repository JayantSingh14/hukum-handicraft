server.port=${PORT:5454}

# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/yt_ecommerce}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── Payment ───────────────────────────────────────────────────────────────────
razorpay.api.key=${RAZORPAY_API_KEY:}
razorpay.api.secret=${RAZORPAY_API_SECRET:}
stripe.api.key=${STRIPE_API_KEY:}

# ── Email (Gmail SMTP) ────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── AI ────────────────────────────────────────────────────────────────────────
gemini.api.key=${GEMINI_API_KEY:}

# ── OAuth ─────────────────────────────────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID:}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.mail=WARN
logging.level.com.sun.mail=WARN
